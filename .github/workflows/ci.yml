name: CI — Run Tests

# Trigger on every push to any branch, and on every pull request
on:
  push:
    branches:
      - "**"       # matches ALL branches
  pull_request:
    branches:
      - main        # run CI when a PR targets main

jobs:
  test:
    name: Run pytest
    runs-on: ubuntu-latest   # fresh Ubuntu VM per run

    steps:

      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python 3.12
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 3: Cache pip packages — speeds up subsequent runs
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('app/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Step 4: Install all Python dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      # Step 5: Run pytest with verbose output and coverage
      - name: Run tests with pytest
        working-directory: app
        run: |
          python -m pytest test_app.py -v --tb=short

      # Step 6: Print a summary of what passed/failed
      - name: Test summary
        if: always()    # run even if tests fail
        run: |
          echo "Tests completed — check the step above for details"
